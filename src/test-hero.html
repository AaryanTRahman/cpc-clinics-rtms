<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Scene Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #071a12;   /* page background — swap this to test compositing */
            overflow: hidden;
        }

        /* The canvas fills the viewport and sits on top of the page */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;  /* remove this if you need mouse events on the canvas */
        }

        /* ── Debug overlay ── */
        #controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            color: #7effd4;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #controls label { display: flex; align-items: center; gap: 10px; }
        #controls input[type=range] { width: 160px; }
    </style>
</head>
<body>

    <!-- The canvas SceneBase will render into -->
    <canvas id="hero-canvas"></canvas>

    <!-- Quick debug controls — remove these for production -->
    <div id="controls">
        <label>
            Activation
            <input type="range" id="activation" min="0" max="1" step="0.01" value="1">
            <span id="activation-val">1.00</span>
        </label>
        <label>
            Bloom strength
            <input type="range" id="bloom" min="0" max="2" step="0.05" value="0.3">
            <span id="bloom-val">0.30</span>
        </label>
    </div>

    <!--
        Import map tells the browser where to resolve bare specifiers like 'three'.
        Adjust the version tag if needed, or swap for a local node_modules path.
    -->
    <script type="importmap">
    {
        "imports": {
            "three":                          "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/addons/":                  "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import { initHeroScene } from './HeroScene.js';

        const canvas = document.getElementById('hero-canvas');

        const { sceneBase, setBrainActivation } = await initHeroScene(canvas, {
            modelBasePath: '/models',
            bgImagePath:   '/images/NeuronBG.png',
            // Override any param here to test:
            // fov: 40,
            // bgColor: '#ff00ff',
            // brain: { neuronColor1: '#0055ff', neuronColor2: '#00ffaa' },
        });

        // ── Wire up debug sliders ──
        const activationSlider = document.getElementById('activation');
        const activationVal    = document.getElementById('activation-val');
        activationSlider.addEventListener('input', () => {
            const v = parseFloat(activationSlider.value);
            activationVal.textContent = v.toFixed(2);
            setBrainActivation(v);
        });

        const bloomSlider = document.getElementById('bloom');
        const bloomVal    = document.getElementById('bloom-val');
        bloomSlider.addEventListener('input', () => {
            const v = parseFloat(bloomSlider.value);
            bloomVal.textContent = v.toFixed(2);
            sceneBase.setBloom({ strength: v });
        });
    </script>

</body>
</html>
